<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA Clinic Finder</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- App CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div>
          <h1 class="header-title">LA Clinic Finder</h1>
          <p class="header-sub">Los Angeles · <span id="clinic-count">25</span> clinics</p>
        </div>
      </div>

      <div class="header-controls">
        <div class="search-wrap">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            id="search-input"
            type="text"
            placeholder="Search by name, service, address…"
            autocomplete="off"
          />
          <button id="clear-search" class="clear-btn" title="Clear search" aria-label="Clear search">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <div class="filter-wrap">
          <svg class="filter-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
          </svg>
          <select id="type-filter">
            <option value="All">All Types</option>
            <option value="General">General</option>
            <option value="Dental">Dental</option>
            <option value="Mental Health">Mental Health</option>
            <option value="Urgent Care">Urgent Care</option>
            <option value="Pediatric">Pediatric</option>
            <option value="Vision">Vision</option>
            <option value="Physical Therapy">Physical Therapy</option>
            <option value="Dermatology">Dermatology</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== RESULTS BAR ===== -->
  <div class="results-bar">
    <span id="results-label">Showing all 25 clinics</span>
    <button id="reset-filters-btn" class="reset-btn hidden">Reset filters</button>
  </div>

  <!-- ===== MAIN LAYOUT ===== -->
  <main class="app-main">

    <!-- LEFT: Clinic List -->
    <aside class="panel-list" id="panel-list">
      <div id="clinic-list" class="clinic-list">
        <!-- Clinic cards rendered by app.js -->
      </div>
      <div id="no-results" class="no-results hidden">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>No clinics match your search.</p>
        <button onclick="window.resetFilters()">Clear filters</button>
      </div>
    </aside>

    <!-- RIGHT: Map -->
    <section class="panel-map">
      <div id="map"></div>
    </section>

  </main>

  <!-- ===== DETAIL PANEL (slide-in) ===== -->
  <div id="detail-overlay" class="detail-overlay hidden" aria-modal="true" role="dialog">
    <div id="detail-panel" class="detail-panel">

      <div class="detail-header">
        <div class="detail-title-group">
          <span id="detail-type-badge" class="type-badge"></span>
          <span id="detail-neighborhood" class="detail-neighborhood"></span>
        </div>
        <button id="detail-close" class="detail-close" aria-label="Close detail panel">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <h2 id="detail-name" class="detail-name"></h2>

      <div class="detail-info-grid">

        <div class="detail-info-item">
          <div class="detail-info-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </div>
          <div>
            <div class="detail-info-label">Address</div>
            <div id="detail-address" class="detail-info-value"></div>
          </div>
        </div>

        <div class="detail-info-item">
          <div class="detail-info-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07
                       19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67
                       A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72
                       12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91
                       a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45
                       12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </div>
          <div>
            <div class="detail-info-label">Phone</div>
            <a id="detail-phone" class="detail-info-value detail-link" href=""></a>
          </div>
        </div>

        <div class="detail-info-item">
          <div class="detail-info-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div>
            <div class="detail-info-label">Hours</div>
            <div id="detail-hours" class="detail-info-value"></div>
          </div>
        </div>

        <div class="detail-info-item">
          <div class="detail-info-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10
                       15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </div>
          <div>
            <div class="detail-info-label">Website</div>
            <a id="detail-website" class="detail-info-value detail-link" href="" target="_blank" rel="noopener noreferrer"></a>
          </div>
        </div>

      </div>

      <div class="detail-section">
        <h3 class="detail-section-title">About</h3>
        <p id="detail-description" class="detail-description"></p>
      </div>

      <div class="detail-section">
        <h3 class="detail-section-title">Services Offered</h3>
        <div id="detail-services" class="detail-services"></div>
      </div>

      <div class="detail-actions">
        <a id="detail-directions" href="" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 11 22 2 13 21 11 13 3 11"/>
          </svg>
          Get Directions
        </a>
        <a id="detail-call" href="" class="btn btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07
                     19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67
                     A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72
                     12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91
                     a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45
                     12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          Call Now
        </a>
      </div>

    </div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WPeU="
    crossorigin="">
  </script>

  <!-- App JS -->
  <script src="app.js"></script>

</body>
</html>
